name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build switcher
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -o "dist/switcher-${GOOS}-${GOARCH}" ./cmd/switcher/

      - name: Create GitHub release
        if: matrix.goos == 'darwin' && matrix.goarch == 'amd64'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        with:
          files: dist/switcher-${{ matrix.goos }}-${{ matrix.goarch }}
